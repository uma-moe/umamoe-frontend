server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_comp_level 5;
  gzip_min_length 1024;
  gzip_vary on;
  gzip_types
    application/javascript
    application/json
    application/xml
    image/svg+xml
    text/css
    text/plain
    text/xml;

  location = /healthz {
    access_log off;
    add_header Content-Type text/plain;
    return 204;
  }

  location ^~ /api/ {
    return 404;
  }

  location ^~ /ingest/ {
    return 404;
  }

  location ^~ /resources/ {
    return 404;
  }

  location ^~ /status-api/ {
    return 404;
  }

  location ^~ /assets/ {
    try_files $uri =404;
    add_header Cache-Control "public, max-age=604800" always;
  }

  location ~* \.(?:js|css|woff2?|svg|ico)$ {
    try_files $uri =404;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
  }

  location = /index.html {
    add_header Cache-Control "no-cache, must-revalidate" always;
  }

  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-cache, must-revalidate" always;
  }
}