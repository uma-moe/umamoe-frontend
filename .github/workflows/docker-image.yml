name: Build And Deploy SPA

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      build_script:
        description: optional npm build script override
        required: false
        default: ''
        type: string
      deploy_assets:
        description: force-deploy the assets bundle even if no asset inputs changed
        required: false
        default: false
        type: boolean

permissions:
  contents: read

env:
  PLATFORM: 'linux/amd64'
  CACHE_SCOPE: 'spa-artifacts'
  DEPLOY_USER: 'github'
  BETA_REMOTE_SHELL_DIR: '/var/www/html/umamoe_beta'
  BETA_REMOTE_ASSETS_DIR: '/var/www/html/umamoe_beta/assets'
  PROD_REMOTE_SHELL_DIR: '/var/www/html/umamoe'
  PROD_REMOTE_ASSETS_DIR: '/var/www/html/umamoe/assets'

concurrency:
  group: "deploy-${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      build_script: ${{ steps.plan.outputs.build_script }}
      deploy_target: ${{ steps.plan.outputs.deploy_target }}
      should_deploy_assets: ${{ steps.assets_plan.outputs.should_build }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect asset-affecting changes
        id: asset_changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            assets:
              - 'Dockerfile'
              - '.dockerignore'
              - 'angular.json'
              - 'package.json'
              - 'package-lock.json'
              - 'scripts/**'
              - 'src/assets/**'
              - 'src/data/**'

      - name: Choose deployment plan
        id: plan
        shell: bash
        run: |
          deploy_target=beta
          build_script="${{ github.event.inputs.build_script || '' }}"
          if [[ -z "$build_script" ]]; then
            build_script=build:beta
          fi

          echo "deploy_target=$deploy_target" >> "$GITHUB_OUTPUT"
          echo "build_script=$build_script" >> "$GITHUB_OUTPUT"

      - name: Inject frontend config from secrets
        id: frontend_config
        shell: bash
        env:
          BETA_TURNSTILE_SITE_KEY: ${{ secrets.BETA_TURNSTILE_SITE_KEY }}
          GOOGLE_ANALYTICS_MEASUREMENT: ${{ secrets.GOOGLE_ANALYTICS_MEASUREMENT }}
        run: |
          set -euo pipefail

          validate_turnstile_site_key() {
            local env_name="$1"
            local site_key="$2"

            if [[ -z "$site_key" ]]; then
              echo "::error title=Missing ${env_name} Turnstile site key::Set the ${env_name}_TURNSTILE_SITE_KEY secret to the actual Cloudflare site key value."
              exit 1
            fi

            if [[ "$site_key" == *"{"* || "$site_key" == *"}"* ]]; then
              echo "::error title=Invalid ${env_name} Turnstile site key::The configured value looks like a placeholder. Store the raw Cloudflare site key in the GitHub secret, not a template token."
              exit 1
            fi

            if [[ "$site_key" == *"'"* || "$site_key" == *'"'* ]]; then
              echo "::error title=Invalid ${env_name} Turnstile site key::The configured value contains quote characters and cannot be injected safely."
              exit 1
            fi
          }

          validate_google_analytics_measurement_id() {
            local env_name="$1"
            local measurement_id="$2"

            if [[ -z "$measurement_id" ]]; then
              echo "::error title=Missing ${env_name} Google Analytics measurement ID::Set the GOOGLE_ANALYTICS_MEASUREMENT secret to a GA4 measurement ID like G-XXXXXXXXXX."
              exit 1
            fi

            if [[ ! "$measurement_id" =~ ^G-[A-Z0-9]+$ ]]; then
              echo "::error title=Invalid ${env_name} Google Analytics measurement ID::Expected a GA4 measurement ID like G-XXXXXXXXXX."
              exit 1
            fi
          }

          validate_turnstile_site_key "BETA" "$BETA_TURNSTILE_SITE_KEY"
          validate_google_analytics_measurement_id "BETA" "$GOOGLE_ANALYTICS_MEASUREMENT"

          SITE_KEY="$BETA_TURNSTILE_SITE_KEY" perl -0pi -e 'my $replacement = "siteKey: \x27$ENV{SITE_KEY}\x27,"; my $count = s/siteKey:\s*[\x27"][^\x27"]*[\x27"],/$replacement/; die "siteKey property not found\n" unless $count;' src/environments/environment.beta.ts
          GA_MEASUREMENT_ID="$GOOGLE_ANALYTICS_MEASUREMENT" perl -0pi -e 'my $replacement = "measurementId: \x27$ENV{GA_MEASUREMENT_ID}\x27,"; my $count = s/measurementId:\s*[\x27"][^\x27"]*[\x27"],/$replacement/; die "Google Analytics measurementId property not found\n" unless $count;' src/environments/environment.beta.ts

          if grep -Eq "siteKey: ['\"][^'\"]*[{}][^'\"]*['\"]" src/environments/environment.beta.ts; then
            echo "::error title=Invalid BETA Turnstile site key injection::The beta environment file still contains a placeholder-like siteKey after injection."
            exit 1
          fi

          if grep -Eq "siteKey: ['\"]['\"]" src/environments/environment.beta.ts; then
            echo "::error title=Missing BETA Turnstile site key injection::The beta environment file still contains an empty siteKey after injection."
            exit 1
          fi

          if grep -Eq "measurementId: ['\"]['\"]" src/environments/environment.beta.ts; then
            echo "::error title=Missing BETA Google Analytics measurement ID injection::The beta environment file still contains an empty measurementId after injection."
            exit 1
          fi

          echo "turnstile_site_key_sha=$(printf '%s' "$BETA_TURNSTILE_SITE_KEY" | sha256sum | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "frontend_config_sha=$(printf '%s:%s' "$BETA_TURNSTILE_SITE_KEY" "$GOOGLE_ANALYTICS_MEASUREMENT" | sha256sum | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Decide whether assets should deploy
        id: assets_plan
        shell: bash
        run: |
          should_build=false
          if [[ "${{ steps.asset_changes.outputs.assets }}" == "true" ]]; then
            should_build=true
          fi
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ github.event.inputs.deploy_assets || 'false' }}" == "true" ]]; then
            should_build=true
          fi
          echo "should_build=$should_build" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build shell artifact
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: shell
          platforms: ${{ env.PLATFORM }}
          pull: true
          build-args: |
            BUILD_SCRIPT=${{ steps.plan.outputs.build_script }}
            FRONTEND_CONFIG_FINGERPRINT=${{ steps.frontend_config.outputs.frontend_config_sha }}
          outputs: type=local,dest=${{ runner.temp }}/shell-export
          cache-from: type=gha,scope=${{ env.CACHE_SCOPE }}
          cache-to: type=gha,mode=max,scope=${{ env.CACHE_SCOPE }}

      - name: Verify shell artifact frontend config
        shell: bash
        env:
          BETA_TURNSTILE_SITE_KEY: ${{ secrets.BETA_TURNSTILE_SITE_KEY }}
          GOOGLE_ANALYTICS_MEASUREMENT: ${{ secrets.GOOGLE_ANALYTICS_MEASUREMENT }}
        run: |
          set -euo pipefail

          expected_hash="$(printf '%s' "$BETA_TURNSTILE_SITE_KEY" | sha256sum | awk '{print $1}')"
          found_expected=false
          mapfile -t built_site_keys < <(find "${{ runner.temp }}/shell-export/var/www/html/umamoe" -type f -name '*.js' -print0 | xargs -0 perl -ne 'while (/siteKey:\s*"([^"]*)"/g) { print "$1\n" }')

          if [[ ${#built_site_keys[@]} -eq 0 ]]; then
            echo "::error title=Missing BETA Turnstile site key in artifact::No compiled siteKey value was found in the exported JavaScript."
            exit 1
          fi

          for built_site_key in "${built_site_keys[@]}"; do
            if [[ -z "$built_site_key" || "$built_site_key" == *"{"* || "$built_site_key" == *"}"* ]]; then
              echo "::error title=Invalid BETA Turnstile site key in artifact::The exported JavaScript still contains an empty or placeholder-like siteKey."
              exit 1
            fi

            if [[ "$(printf '%s' "$built_site_key" | sha256sum | awk '{print $1}')" == "$expected_hash" ]]; then
              found_expected=true
            fi
          done

          if [[ "$found_expected" != "true" ]]; then
            echo "::error title=BETA Turnstile site key mismatch::The exported JavaScript siteKey does not match the configured GitHub secret."
            exit 1
          fi

          if [[ -z "$GOOGLE_ANALYTICS_MEASUREMENT" ]]; then
            echo "::error title=Missing BETA Google Analytics measurement ID::Set the GOOGLE_ANALYTICS_MEASUREMENT secret to a GA4 measurement ID like G-XXXXXXXXXX."
            exit 1
          fi

          expected_ga_hash="$(printf '%s' "$GOOGLE_ANALYTICS_MEASUREMENT" | sha256sum | awk '{print $1}')"
          found_expected_ga=false
          mapfile -t built_ga_ids < <(find "${{ runner.temp }}/shell-export/var/www/html/umamoe" -type f -name '*.js' -print0 | xargs -0 perl -ne 'while (/measurementId:\s*"([^"]*)"/g) { print "$1\n" }')

          if [[ ${#built_ga_ids[@]} -eq 0 ]]; then
            echo "::error title=Missing BETA Google Analytics measurement ID in artifact::No compiled measurementId value was found in the exported JavaScript."
            exit 1
          fi

          for built_ga_id in "${built_ga_ids[@]}"; do
            if [[ "$(printf '%s' "$built_ga_id" | sha256sum | awk '{print $1}')" == "$expected_ga_hash" ]]; then
              found_expected_ga=true
            fi
          done

          if [[ "$found_expected_ga" != "true" ]]; then
            echo "::error title=BETA Google Analytics measurement ID mismatch::The exported JavaScript measurementId does not match the configured GitHub secret."
            exit 1
          fi

      - name: Build assets artifact
        if: steps.assets_plan.outputs.should_build == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: assets
          platforms: ${{ env.PLATFORM }}
          pull: true
          build-args: |
            BUILD_SCRIPT=${{ steps.plan.outputs.build_script }}
            FRONTEND_CONFIG_FINGERPRINT=${{ steps.frontend_config.outputs.frontend_config_sha }}
          outputs: type=local,dest=${{ runner.temp }}/assets-export
          cache-from: type=gha,scope=${{ env.CACHE_SCOPE }}
          cache-to: type=gha,mode=max,scope=${{ env.CACHE_SCOPE }}

      - name: Upload shell artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: shell-site
          path: ${{ runner.temp }}/shell-export/var/www/html/umamoe/
          if-no-files-found: error

      - name: Upload assets artifact
        if: github.event_name != 'pull_request' && steps.assets_plan.outputs.should_build == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: asset-site
          path: ${{ runner.temp }}/assets-export/assets/
          if-no-files-found: error

  deploy_beta:
    if: github.event_name != 'pull_request' && needs.build.outputs.deploy_target == 'beta'
    needs: build
    runs-on: ubuntu-latest
    environment: beta
    steps:
      - name: Download shell artifact
        uses: actions/download-artifact@v4
        with:
          name: shell-site
          path: ${{ runner.temp }}/shell-site

      - name: Download assets artifact
        if: needs.build.outputs.should_deploy_assets == 'true'
        uses: actions/download-artifact@v4
        with:
          name: asset-site
          path: ${{ runner.temp }}/asset-site

      - name: Mask deployment metadata
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
          REMOTE_SHELL_DIR: ${{ env.BETA_REMOTE_SHELL_DIR }}
          REMOTE_ASSETS_DIR: ${{ env.BETA_REMOTE_ASSETS_DIR }}
        run: |
          set -euo pipefail

          mask_value() {
            local value="$1"
            if [[ -n "$value" ]]; then
              echo "::add-mask::$value"
            fi
          }

          mask_value "$DEPLOY_HOST"
          mask_value "$REMOTE_SHELL_DIR"
          mask_value "$REMOTE_ASSETS_DIR"

          while IFS= read -r known_host_line; do
            mask_value "$known_host_line"
            read -r known_host _ key_body _ <<< "$known_host_line"
            mask_value "$known_host"
            mask_value "$key_body"
          done <<< "$DEPLOY_KNOWN_HOSTS"

      - name: Start SSH agent
        shell: bash
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          set -euo pipefail
          eval "$(ssh-agent -s)" >/dev/null
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> "$GITHUB_ENV"
          echo "SSH_AGENT_PID=$SSH_AGENT_PID" >> "$GITHUB_ENV"
          ssh-add - <<< "$DEPLOY_SSH_KEY" >/dev/null 2>&1

      - name: Configure known hosts
        shell: bash
        env:
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Ensure remote directories exist
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
        run: |
          ssh -o LogLevel=ERROR -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
            "mkdir -p '${{ env.BETA_REMOTE_SHELL_DIR }}' '${{ env.BETA_REMOTE_ASSETS_DIR }}'"

      - name: Deploy beta shell bundle
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
        run: |
          rsync -az --delete \
            --exclude 'assets/' \
            --exclude 'statistics/' \
            -e "ssh -o LogLevel=ERROR -p $DEPLOY_PORT" \
            "${{ runner.temp }}/shell-site/" \
            "$DEPLOY_USER@$DEPLOY_HOST:${{ env.BETA_REMOTE_SHELL_DIR }}/"

      - name: Deploy beta assets bundle
        if: needs.build.outputs.should_deploy_assets == 'true'
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
        run: |
          set -euo pipefail

          remote_tmp="/tmp/umamoe-assets-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-beta"
          remote_file="$remote_tmp/precomputed-tierlist.json"
          remote_target="${{ env.BETA_REMOTE_ASSETS_DIR }}/data/precomputed-tierlist.json"

          ssh -o LogLevel=ERROR -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
            "rm -rf '$remote_tmp' && mkdir -p '$remote_tmp'"

          rsync -az --no-perms --no-owner --no-group \
            -e "ssh -o LogLevel=ERROR -p $DEPLOY_PORT" \
            "${{ runner.temp }}/asset-site/data/precomputed-tierlist.json" \
            "$DEPLOY_USER@$DEPLOY_HOST:$remote_file"

          ssh -o LogLevel=ERROR -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
            "if install -D -m 0644 '$remote_file' '$remote_target' 2>/dev/null; then rm -rf '$remote_tmp'; elif command -v sudo >/dev/null 2>&1 && sudo -n true 2>/dev/null; then sudo install -D -m 0644 -o '$DEPLOY_USER' '$remote_file' '$remote_target' && rm -rf '$remote_tmp'; else echo 'Cannot write $remote_target as $DEPLOY_USER, and passwordless sudo is unavailable.' >&2; rm -rf '$remote_tmp'; exit 1; fi"

  deploy_production:
    if: github.event_name != 'pull_request' && needs.build.outputs.deploy_target == 'beta'
    needs:
      - build
      - deploy_beta
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Inject production frontend config from secrets
        id: production_frontend_config
        shell: bash
        env:
          PROD_TURNSTILE_SITE_KEY: ${{ secrets.PROD_TURNSTILE_SITE_KEY }}
          GOOGLE_ANALYTICS_MEASUREMENT: ${{ secrets.GOOGLE_ANALYTICS_MEASUREMENT }}
        run: |
          set -euo pipefail

          validate_turnstile_site_key() {
            local env_name="$1"
            local site_key="$2"

            if [[ -z "$site_key" ]]; then
              echo "::error title=Missing ${env_name} Turnstile site key::Set the ${env_name}_TURNSTILE_SITE_KEY secret to the actual Cloudflare site key value."
              exit 1
            fi

            if [[ "$site_key" == *"{"* || "$site_key" == *"}"* ]]; then
              echo "::error title=Invalid ${env_name} Turnstile site key::The configured value looks like a placeholder. Store the raw Cloudflare site key in the GitHub secret, not a template token."
              exit 1
            fi

            if [[ "$site_key" == *"'"* || "$site_key" == *'"'* ]]; then
              echo "::error title=Invalid ${env_name} Turnstile site key::The configured value contains quote characters and cannot be injected safely."
              exit 1
            fi
          }

          validate_google_analytics_measurement_id() {
            local env_name="$1"
            local measurement_id="$2"

            if [[ -z "$measurement_id" ]]; then
              echo "::error title=Missing ${env_name} Google Analytics measurement ID::Set the GOOGLE_ANALYTICS_MEASUREMENT secret to a GA4 measurement ID like G-XXXXXXXXXX."
              exit 1
            fi

            if [[ ! "$measurement_id" =~ ^G-[A-Z0-9]+$ ]]; then
              echo "::error title=Invalid ${env_name} Google Analytics measurement ID::Expected a GA4 measurement ID like G-XXXXXXXXXX."
              exit 1
            fi
          }

          validate_turnstile_site_key "PROD" "$PROD_TURNSTILE_SITE_KEY"
          validate_google_analytics_measurement_id "PROD" "$GOOGLE_ANALYTICS_MEASUREMENT"

          SITE_KEY="$PROD_TURNSTILE_SITE_KEY" perl -0pi -e 'my $replacement = "siteKey: \x27$ENV{SITE_KEY}\x27,"; my $count = s/siteKey:\s*[\x27"][^\x27"]*[\x27"],/$replacement/; die "siteKey property not found\n" unless $count;' src/environments/environment.prod.ts
          GA_MEASUREMENT_ID="$GOOGLE_ANALYTICS_MEASUREMENT" perl -0pi -e 'my $replacement = "measurementId: \x27$ENV{GA_MEASUREMENT_ID}\x27,"; my $count = s/measurementId:\s*[\x27"][^\x27"]*[\x27"],/$replacement/; die "Google Analytics measurementId property not found\n" unless $count;' src/environments/environment.prod.ts

          if grep -Eq "siteKey: ['\"][^'\"]*[{}][^'\"]*['\"]" src/environments/environment.prod.ts; then
            echo "::error title=Invalid PROD Turnstile site key injection::The production environment file still contains a placeholder-like siteKey after injection."
            exit 1
          fi

          if grep -Eq "siteKey: ['\"]['\"]" src/environments/environment.prod.ts; then
            echo "::error title=Missing PROD Turnstile site key injection::The production environment file still contains an empty siteKey after injection."
            exit 1
          fi

          if grep -Eq "measurementId: ['\"]['\"]" src/environments/environment.prod.ts; then
            echo "::error title=Missing PROD Google Analytics measurement ID injection::The production environment file still contains an empty measurementId after injection."
            exit 1
          fi

          echo "turnstile_site_key_sha=$(printf '%s' "$PROD_TURNSTILE_SITE_KEY" | sha256sum | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "frontend_config_sha=$(printf '%s:%s' "$PROD_TURNSTILE_SITE_KEY" "$GOOGLE_ANALYTICS_MEASUREMENT" | sha256sum | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Build production shell artifact
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: shell
          platforms: ${{ env.PLATFORM }}
          pull: true
          build-args: |
            BUILD_SCRIPT=build:prod
            FRONTEND_CONFIG_FINGERPRINT=${{ steps.production_frontend_config.outputs.frontend_config_sha }}
          outputs: type=local,dest=${{ runner.temp }}/production-shell-export
          cache-from: type=gha,scope=${{ env.CACHE_SCOPE }}
          cache-to: type=gha,mode=max,scope=${{ env.CACHE_SCOPE }}

      - name: Verify production API target
        shell: bash
        env:
          PROD_TURNSTILE_SITE_KEY: ${{ secrets.PROD_TURNSTILE_SITE_KEY }}
          GOOGLE_ANALYTICS_MEASUREMENT: ${{ secrets.GOOGLE_ANALYTICS_MEASUREMENT }}
        run: |
          set -euo pipefail

          if grep -R "https://beta.uma.moe" "${{ runner.temp }}/production-shell-export/var/www/html/umamoe"; then
            echo "::error title=Production artifact points to beta::The production shell bundle contains beta.uma.moe URLs."
            exit 1
          fi

          if ! grep -R "https://uma.moe" "${{ runner.temp }}/production-shell-export/var/www/html/umamoe" >/dev/null; then
            echo "::error title=Production API URL missing::The production shell bundle does not contain the expected uma.moe URL."
            exit 1
          fi

          expected_hash="$(printf '%s' "$PROD_TURNSTILE_SITE_KEY" | sha256sum | awk '{print $1}')"
          found_expected=false
          mapfile -t built_site_keys < <(find "${{ runner.temp }}/production-shell-export/var/www/html/umamoe" -type f -name '*.js' -print0 | xargs -0 perl -ne 'while (/siteKey:\s*"([^"]*)"/g) { print "$1\n" }')

          if [[ ${#built_site_keys[@]} -eq 0 ]]; then
            echo "::error title=Missing PROD Turnstile site key in artifact::No compiled siteKey value was found in the exported JavaScript."
            exit 1
          fi

          for built_site_key in "${built_site_keys[@]}"; do
            if [[ -z "$built_site_key" || "$built_site_key" == *"{"* || "$built_site_key" == *"}"* ]]; then
              echo "::error title=Invalid PROD Turnstile site key in artifact::The exported JavaScript still contains an empty or placeholder-like siteKey."
              exit 1
            fi

            if [[ "$(printf '%s' "$built_site_key" | sha256sum | awk '{print $1}')" == "$expected_hash" ]]; then
              found_expected=true
            fi
          done

          if [[ "$found_expected" != "true" ]]; then
            echo "::error title=PROD Turnstile site key mismatch::The exported JavaScript siteKey does not match the configured GitHub secret."
            exit 1
          fi

          if [[ -z "$GOOGLE_ANALYTICS_MEASUREMENT" ]]; then
            echo "::error title=Missing PROD Google Analytics measurement ID::Set the GOOGLE_ANALYTICS_MEASUREMENT secret to a GA4 measurement ID like G-XXXXXXXXXX."
            exit 1
          fi

          expected_ga_hash="$(printf '%s' "$GOOGLE_ANALYTICS_MEASUREMENT" | sha256sum | awk '{print $1}')"
          found_expected_ga=false
          mapfile -t built_ga_ids < <(find "${{ runner.temp }}/production-shell-export/var/www/html/umamoe" -type f -name '*.js' -print0 | xargs -0 perl -ne 'while (/measurementId:\s*"([^"]*)"/g) { print "$1\n" }')

          if [[ ${#built_ga_ids[@]} -eq 0 ]]; then
            echo "::error title=Missing PROD Google Analytics measurement ID in artifact::No compiled measurementId value was found in the exported JavaScript."
            exit 1
          fi

          for built_ga_id in "${built_ga_ids[@]}"; do
            if [[ "$(printf '%s' "$built_ga_id" | sha256sum | awk '{print $1}')" == "$expected_ga_hash" ]]; then
              found_expected_ga=true
            fi
          done

          if [[ "$found_expected_ga" != "true" ]]; then
            echo "::error title=PROD Google Analytics measurement ID mismatch::The exported JavaScript measurementId does not match the configured GitHub secret."
            exit 1
          fi

      - name: Download assets artifact
        if: needs.build.outputs.should_deploy_assets == 'true'
        uses: actions/download-artifact@v4
        with:
          name: asset-site
          path: ${{ runner.temp }}/asset-site

      - name: Mask deployment metadata
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
          REMOTE_SHELL_DIR: ${{ env.PROD_REMOTE_SHELL_DIR }}
          REMOTE_ASSETS_DIR: ${{ env.PROD_REMOTE_ASSETS_DIR }}
        run: |
          set -euo pipefail

          mask_value() {
            local value="$1"
            if [[ -n "$value" ]]; then
              echo "::add-mask::$value"
            fi
          }

          mask_value "$DEPLOY_HOST"
          mask_value "$REMOTE_SHELL_DIR"
          mask_value "$REMOTE_ASSETS_DIR"

          while IFS= read -r known_host_line; do
            mask_value "$known_host_line"
            read -r known_host _ key_body _ <<< "$known_host_line"
            mask_value "$known_host"
            mask_value "$key_body"
          done <<< "$DEPLOY_KNOWN_HOSTS"

      - name: Start SSH agent
        shell: bash
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          set -euo pipefail
          eval "$(ssh-agent -s)" >/dev/null
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> "$GITHUB_ENV"
          echo "SSH_AGENT_PID=$SSH_AGENT_PID" >> "$GITHUB_ENV"
          ssh-add - <<< "$DEPLOY_SSH_KEY" >/dev/null 2>&1

      - name: Configure known hosts
        shell: bash
        env:
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Ensure remote directories exist
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
        run: |
          ssh -o LogLevel=ERROR -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
            "mkdir -p '${{ env.PROD_REMOTE_SHELL_DIR }}' '${{ env.PROD_REMOTE_ASSETS_DIR }}'"

      - name: Deploy production shell bundle
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
        run: |
          rsync -az --delete \
            --exclude 'assets/' \
            --exclude 'statistics/' \
            -e "ssh -o LogLevel=ERROR -p $DEPLOY_PORT" \
            "${{ runner.temp }}/production-shell-export/var/www/html/umamoe/" \
            "$DEPLOY_USER@$DEPLOY_HOST:${{ env.PROD_REMOTE_SHELL_DIR }}/"

      - name: Deploy production assets bundle
        if: needs.build.outputs.should_deploy_assets == 'true'
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
        run: |
          set -euo pipefail

          remote_tmp="/tmp/umamoe-assets-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-production"
          remote_file="$remote_tmp/precomputed-tierlist.json"
          remote_target="${{ env.PROD_REMOTE_ASSETS_DIR }}/data/precomputed-tierlist.json"

          ssh -o LogLevel=ERROR -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
            "rm -rf '$remote_tmp' && mkdir -p '$remote_tmp'"

          rsync -az --no-perms --no-owner --no-group \
            -e "ssh -o LogLevel=ERROR -p $DEPLOY_PORT" \
            "${{ runner.temp }}/asset-site/data/precomputed-tierlist.json" \
            "$DEPLOY_USER@$DEPLOY_HOST:$remote_file"

          ssh -o LogLevel=ERROR -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
            "if install -D -m 0644 '$remote_file' '$remote_target' 2>/dev/null; then rm -rf '$remote_tmp'; elif command -v sudo >/dev/null 2>&1 && sudo -n true 2>/dev/null; then sudo install -D -m 0644 -o '$DEPLOY_USER' '$remote_file' '$remote_target' && rm -rf '$remote_tmp'; else echo 'Cannot write $remote_target as $DEPLOY_USER, and passwordless sudo is unavailable.' >&2; rm -rf '$remote_tmp'; exit 1; fi"
