<ng-container *ngIf="adLayoutActive">
  <ng-container *ngIf="config.sideRails && sideRailsVisible">
    <aside
      *ngIf="(sideRailLayout === 'left' || sideRailLayout === 'both') && (config.sideRails.left.fuseId || fallbackPreviewEnabled)"
      class="ad-side-rail ad-side-rail--left"
      [class.ad-side-rail--collapsed]="leftSideRailCollapsed"
      [class.ad-side-rail--overlay]="config.sideRailOverlay"
      aria-label="Sponsored side rail"
      [style.left.px]="sideRailLeft"
      [style.top.px]="sideRailTop"
      [style.--ad-side-rail-width]="sideRailWidth + 'px'"
    >
      <app-ad-slot
        [config]="config.sideRails.left"
        [forceFallback]="fallbackPreviewEnabled"
        [maxWidth]="sideRailWidth"
        (collapsedChange)="onSideRailCollapsed('left', $event)"
      ></app-ad-slot>
    </aside>
    <aside
      *ngIf="(sideRailLayout === 'right' || sideRailLayout === 'both') && (config.sideRails.right.fuseId || fallbackPreviewEnabled)"
      class="ad-side-rail ad-side-rail--right"
      [class.ad-side-rail--collapsed]="rightSideRailCollapsed"
      [class.ad-side-rail--overlay]="config.sideRailOverlay"
      aria-label="Sponsored side rail"
      [style.right.px]="sideRailRight"
      [style.top.px]="sideRailTop"
      [style.--ad-side-rail-width]="sideRailWidth + 'px'"
    >
      <app-ad-slot
        [config]="config.sideRails.right"
        [forceFallback]="fallbackPreviewEnabled"
        [maxWidth]="sideRailWidth"
        (collapsedChange)="onSideRailCollapsed('right', $event)"
      ></app-ad-slot>
    </aside>
  </ng-container>
</ng-container>

<div
  *ngIf="shouldShowProviderStickyFooter"
  class="ad-provider-sticky-footer"
  aria-label="Sponsored sticky footer"
>
  <app-ad-slot
    [config]="stickyFooterConfig"
    [persistent]="true"
    [providerManaged]="true"
    (collapsedChange)="onProviderStickyFooterCollapsed($event)"
  ></app-ad-slot>
</div>

<aside
  class="ad-bottom-popup"
  *ngIf="shouldShowBottomSupportFallback"
  aria-label="Support uma.moe"
>
  <app-ad-slot
    [config]="stickyFooterFallbackConfig"
    [closable]="true"
    [forceFallback]="true"
    (close)="closeBottomPopup()"
  ></app-ad-slot>
</aside>
