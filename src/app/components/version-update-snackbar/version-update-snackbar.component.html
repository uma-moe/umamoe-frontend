<div class="version-update" role="status" aria-live="polite">
  <div class="version-update__accent" aria-hidden="true"></div>

  <div class="version-update__icon" aria-hidden="true">
    <mat-icon>system_update_alt</mat-icon>
  </div>

  <div class="version-update__copy">
    <div class="version-update__eyebrow">Update ready</div>
    <div class="version-update__title">A fresh build is live</div>
    <div class="version-update__body">Reload to use the newest site files.</div>
  </div>

  <div class="version-update__actions">
    <button type="button" mat-button class="version-update__dismiss" (click)="dismiss()">
      Later
    </button>

    <button type="button" mat-flat-button class="version-update__reload" (click)="reload()">
      <mat-icon>restart_alt</mat-icon>
      <span>Reload</span>
    </button>
  </div>
</div>
